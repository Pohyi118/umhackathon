services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file:
      - ./backend/.env.prod
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-peoplegraph}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-peoplegraph}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-peoplegraph}"]
      interval: 10s
      timeout: 5s
      retries: 8

  backend:
    build: ./backend
    restart: unless-stopped
    env_file:
      - ./backend/.env.prod
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-peoplegraph}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-peoplegraph}
      DATABASE_URL_SYNC: postgresql://${POSTGRES_USER:-peoplegraph}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-peoplegraph}
      DEBUG: "false"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./frontend
    restart: unless-stopped
    env_file:
      - ./frontend/.env.prod
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
    depends_on:
      - backend

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./deploy/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend

volumes:
  pgdata:
