services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: peoplegraph
      POSTGRES_PASSWORD: peoplegraph
      POSTGRES_DB: peoplegraph
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U peoplegraph"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    environment:
      DATABASE_URL: "postgresql+asyncpg://peoplegraph:peoplegraph@db:5432/peoplegraph"
      DATABASE_URL_SYNC: "postgresql://peoplegraph:peoplegraph@db:5432/peoplegraph"
      SECRET_KEY: "CHANGE-ME-use-openssl-rand-hex-32"
      CORS_ORIGINS: '["http://localhost:3000"]'
      DEBUG: "false"
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./frontend
    environment:
      NEXT_PUBLIC_API_URL: "http://localhost:8000"
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  pgdata:
